# Smithery / Glama one-click install config for rigshare-mcp.
#
# Picked up by:
#   - smithery.ai when it crawls the package
#   - glama.ai/mcp/servers to enable the "Install Server" button
#   - any other MCP discovery surface that follows the Smithery spec
#
# Without this file, those surfaces fall back to "view install
# instructions" and the user has to copy-paste JSON into their own
# Claude Desktop config. With this file, the platform generates the
# config automatically and (optionally) prompts the user for their
# API key.

startCommand:
  type: stdio
  configSchema:
    type: object
    title: RIGShare MCP Configuration
    description: >-
      Optional RIGShare API key. Leave blank to use the 4 public
      read-only tools only. Supply a key to enable the 3 authenticated
      tools (list_my_bookings, list_my_sessions, create_booking). Get
      a key at https://www.rigshare.app/profile#api-keys.
    properties:
      apiKey:
        type: string
        title: RIGShare API Key
        description: >-
          Bearer key, starts with rigsk_live_. Optional. Only needed
          for the 3 authenticated tools. Stored encrypted by your MCP
          client; never transmitted back to smithery.ai or glama.ai.
        format: password
    required: []
  commandFunction: |
    (config) => ({
      command: 'npx',
      args: ['-y', 'rigshare-mcp'],
      env: config.apiKey
        ? { RIGSHARE_API_KEY: config.apiKey }
        : {}
    })
  exampleConfig:
    apiKey: rigsk_live_example_get_a_real_one_at_rigshare_app
